services:
  postgres:
    image: postgres:18.3
    container_name: sso-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: "sso"
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d sso"]
      interval: 5s
      retries: 5
      timeout: 5s

volumes:
  postgres-data:
